<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Card UI Collection</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .mian {
            height: 1000px;
            width: 1400px;

        }

        .cards {
            padding: 10px;
            padding-bottom: 15px;
            height: 500px;
            width: 100%;
            background-color: yellow;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            height: 500px;
            width: 350px;
            background-color: rgb(208, 220, 208);
            margin: 5px;
            border: 2px solid black;
            justify-content: center;

        }

        img {
            height: 80%;
            width: 80%;
        }


        .layout{
            height: 1000px;
            width: 850px;
            background: red;
            align-items: center;
        }
        header{
            background-color: yellow;
            display: flex;
            justify-content: center;
        }
        footer{
            display: flex;
            justify-content: center;
            background-color: skyblue;
            height: 100px;
            align-items: center;
        }
        .table {
            height: 500px;
            width: 650px;
            background-color: yellow;
            margin: 20px;
            display: flex;
            justify-content: center;
        }

        table {
            height: 100%;
            width: 100%;
        }

        table tr {
            text-align: center;
        }

        table tr th {
            background-color: orange;
        }
    </style>
</head>

<body>
    <h2>Product List</h2>
    <br><br><br>
    <div class="mian">
        <div class="cards">
            <div class="card">

            <div class="card">
                <img src="a4.jpeg" alt="Realme Reno 2"><br>

            </div>
        </div>
    </div>

        <div class="table">

</body>

</html>

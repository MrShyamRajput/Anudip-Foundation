<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Card UI Collection</title>
    <link rel="stylesheet" href="style.css">
    <style>
        
        .mian{
            height: 1000px;
            width: 1400px;
            
        }
        .cards{
            padding:10px ;
            padding-bottom: 15px;
            height: 500px;
            width: 100%;
            background-color: yellow;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card{
            height: 500px;
            width: 350px;
            background-color: rgb(208, 220, 208);
            margin: 5px;
            border: 2px solid black;
            justify-content: center;
          
        }
        img{
            height: 80%;
            width: 80%;
        }
    </style>
</head>
<body>
    <h2>Product List</h2>
    <br><br><br>    
    <div class="mian">
        <div class="cards">
            <div class="card">
               <img src="a1.jpg" alt="Realme Reno 2"><br>
               <a href="a1.html">More Details</a>
            </div>
            <div class="card">
               <img src="a2.jpg" alt="Realme Reno 2"><br>
               <a href="a2.html">More Details</a>
            </div>
            <div class="card">
               <img src="a3.jpeg" alt="Realme Reno 2"><br>
               <a href="a3.html">More Details</a>
            </div>
            <div class="card">
               <img src="a4.jpeg" alt="Realme Reno 2"><br>
               <a href="a4.html">More Details</a>
            </div>  
        </div>
    </div>
</body>
</html>
